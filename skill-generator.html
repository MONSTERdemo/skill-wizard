<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Skill 生成器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d9ff;
            font-size: 2rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card h2 {
            color: #00d9ff;
            margin-bottom: 16px;
            font-size: 1.2rem;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #a0a0a0;
            font-size: 0.9rem;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #00d9ff;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }
        .triggers-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .trigger-tag {
            background: rgba(0, 217, 255, 0.2);
            border: 1px solid #00d9ff;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .trigger-tag button {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            line-height: 1;
        }
        .add-trigger {
            display: flex;
            gap: 8px;
        }
        .add-trigger input {
            flex: 1;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            color: #000;
            font-weight: bold;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 0.9rem;
        }
        .output-container {
            position: relative;
        }
        .output {
            background: #0d1117;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .info-box {
            background: rgba(0, 217, 255, 0.1);
            border-left: 4px solid #00d9ff;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 0.9rem;
        }
        .format-select {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .format-option {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        .format-option:hover {
            border-color: rgba(0, 217, 255, 0.5);
        }
        .format-option.active {
            border-color: #00d9ff;
            background: rgba(0, 217, 255, 0.1);
        }
        .format-option input {
            display: none;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .success-msg {
            color: #4ade80;
            margin-top: 8px;
            font-size: 0.9rem;
        }
        .tab-container {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
        }
        .tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab.active {
            background: rgba(0, 217, 255, 0.2);
            border-color: #00d9ff;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Claude Code Skill 生成器</h1>

        <div class="info-box">
            <strong>说明：</strong>此工具用于生成 Claude Code 的 skill 配置文件。
            填写以下信息后，可以生成 Markdown 或 JSON 格式的 skill 文件。
        </div>

        <div class="card">
            <h2>📝 基本信息</h2>
            <div class="form-group">
                <label for="skillName">Skill 名称 (使用 kebab-case，如 my-skill)</label>
                <input type="text" id="skillName" placeholder="例如: swap-planner, code-reviewer">
            </div>
            <div class="form-group">
                <label for="skillTitle">Skill 标题</label>
                <input type="text" id="skillTitle" placeholder="例如: Token Swap Planner">
            </div>
            <div class="form-group">
                <label for="skillDescription">Skill 描述 (描述这个 skill 的用途)</label>
                <textarea id="skillDescription" placeholder="描述这个 skill 做什么，什么时候应该使用它..."></textarea>
            </div>
        </div>

        <div class="card">
            <h2>🎯 触发条件</h2>
            <p style="color: #a0a0a0; margin-bottom: 12px; font-size: 0.9rem;">
                添加用户可能使用的触发短语，帮助 Claude 识别何时使用此 skill
            </p>
            <div class="add-trigger">
                <input type="text" id="triggerInput" placeholder="输入触发短语，按 Enter 添加">
                <button class="btn btn-secondary btn-small" onclick="addTrigger()">添加</button>
            </div>
            <div class="triggers-container" id="triggersContainer"></div>
        </div>

        <div class="card">
            <h2>📄 Skill 内容</h2>
            <div class="form-group">
                <label for="skillContent">Skill 指令/Prompt (当触发此 skill 时，Claude 会收到的指令)</label>
                <textarea id="skillContent" style="min-height: 200px;" placeholder="在这里编写详细的指令...

例如：
## 目标
帮助用户完成 XXX 任务

## 步骤
1. 首先...
2. 然后...
3. 最后...

## 注意事项
- 注意点1
- 注意点2"></textarea>
            </div>
        </div>

        <div class="card">
            <h2>⚙️ 高级选项</h2>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="userInvocable" checked>
                    <span>用户可调用 (User Invocable)</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="autoTrigger">
                    <span>自动触发 (Auto Trigger)</span>
                </label>
            </div>
        </div>

        <div class="card">
            <h2>📤 生成结果</h2>

            <div class="tab-container">
                <div class="tab active" onclick="switchTab('markdown')">Markdown</div>
                <div class="tab" onclick="switchTab('json')">JSON</div>
            </div>

            <div class="actions" style="margin-bottom: 16px;">
                <button class="btn btn-primary" onclick="generateSkill()">🚀 生成 Skill</button>
                <button class="btn btn-secondary" onclick="copyOutput()">📋 复制</button>
                <button class="btn btn-secondary" onclick="downloadSkill()">💾 下载文件</button>
                <button class="btn btn-secondary" onclick="clearForm()">🗑️ 清空</button>
            </div>

            <div class="output-container">
                <div id="output" class="output">// 生成的 skill 文件将显示在这里</div>
            </div>
            <div id="successMsg" class="success-msg" style="display: none;"></div>
        </div>
    </div>

    <script>
        let triggers = [];
        let currentFormat = 'markdown';

        // 添加触发短语
        function addTrigger() {
            const input = document.getElementById('triggerInput');
            const value = input.value.trim();
            if (value && !triggers.includes(value)) {
                triggers.push(value);
                renderTriggers();
                input.value = '';
            }
        }

        // 删除触发短语
        function removeTrigger(index) {
            triggers.splice(index, 1);
            renderTriggers();
        }

        // 渲染触发短语标签
        function renderTriggers() {
            const container = document.getElementById('triggersContainer');
            container.innerHTML = triggers.map((trigger, index) => `
                <div class="trigger-tag">
                    <span>${trigger}</span>
                    <button onclick="removeTrigger(${index})">×</button>
                </div>
            `).join('');
        }

        // 监听 Enter 键添加触发短语
        document.getElementById('triggerInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addTrigger();
            }
        });

        // 切换输出格式
        function switchTab(format) {
            currentFormat = format;
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelector(`.tab:nth-child(${format === 'markdown' ? 1 : 2})`).classList.add('active');
            generateSkill();
        }

        // 生成 skill 文件
        function generateSkill() {
            const name = document.getElementById('skillName').value.trim();
            const title = document.getElementById('skillTitle').value.trim();
            const description = document.getElementById('skillDescription').value.trim();
            const content = document.getElementById('skillContent').value.trim();
            const userInvocable = document.getElementById('userInvocable').checked;
            const autoTrigger = document.getElementById('autoTrigger').checked;

            if (!name) {
                document.getElementById('output').textContent = '// 请至少填写 Skill 名称';
                return;
            }

            let output = '';

            if (currentFormat === 'markdown') {
                output = generateMarkdown(name, title, description, content, userInvocable, autoTrigger);
            } else {
                output = generateJSON(name, title, description, content, userInvocable, autoTrigger);
            }

            document.getElementById('output').textContent = output;
        }

        // 生成 Markdown 格式
        function generateMarkdown(name, title, description, content, userInvocable, autoTrigger) {
            let md = `---
name: ${name}
${title ? `title: ${title}` : `title: ${name}`}
userInvocable: ${userInvocable}
${autoTrigger ? 'autoTrigger: true' : ''}
---

`;

            if (description) {
                md += `# ${title || name}

${description}

`;
            }

            if (triggers.length > 0) {
                md += `## 触发条件

当用户使用以下短语时触发此 skill：
${triggers.map(t => `- "${t}"`).join('\n')}

`;
            }

            if (content) {
                md += `## 指令

${content}
`;
            }

            return md;
        }

        // 生成 JSON 格式
        function generateJSON(name, title, description, content, userInvocable, autoTrigger) {
            const skillObj = {
                name: name,
                title: title || name,
                description: description || '',
                triggers: triggers,
                userInvocable: userInvocable,
                autoTrigger: autoTrigger,
                content: content || ''
            };

            return JSON.stringify(skillObj, null, 2);
        }

        // 复制输出内容
        function copyOutput() {
            const output = document.getElementById('output').textContent;
            navigator.clipboard.writeText(output).then(() => {
                showSuccess('已复制到剪贴板！');
            });
        }

        // 下载文件
        function downloadSkill() {
            const output = document.getElementById('output').textContent;
            const name = document.getElementById('skillName').value.trim() || 'skill';
            const ext = currentFormat === 'markdown' ? 'md' : 'json';
            const blob = new Blob([output], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${name}.${ext}`;
            a.click();
            URL.revokeObjectURL(url);
            showSuccess(`已下载 ${name}.${ext}`);
        }

        // 清空表单
        function clearForm() {
            document.getElementById('skillName').value = '';
            document.getElementById('skillTitle').value = '';
            document.getElementById('skillDescription').value = '';
            document.getElementById('skillContent').value = '';
            document.getElementById('userInvocable').checked = true;
            document.getElementById('autoTrigger').checked = false;
            triggers = [];
            renderTriggers();
            document.getElementById('output').textContent = '// 生成的 skill 文件将显示在这里';
        }

        // 显示成功消息
        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => {
                el.style.display = 'none';
            }, 2000);
        }

        // 实时预览
        ['skillName', 'skillTitle', 'skillDescription', 'skillContent'].forEach(id => {
            document.getElementById(id).addEventListener('input', generateSkill);
        });
        ['userInvocable', 'autoTrigger'].forEach(id => {
            document.getElementById(id).addEventListener('change', generateSkill);
        });
    </script>
</body>
</html>
